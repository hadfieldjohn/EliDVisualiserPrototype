<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#1e3a8a"/>

  <!-- Input node (top) -->
  <rect x="9" y="2" width="14" height="7" rx="2" fill="white" opacity="0.9"/>

  <!-- Connector: input → diamond -->
  <line x1="16" y1="9" x2="16" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Decision diamond -->
  <polygon points="16,12 24,18 16,24 8,18" fill="white"/>

  <!-- Y branch: diamond → right → green action node -->
  <line x1="24" y1="18" x2="28" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="30" cy="18" r="2" fill="#22c55e"/>

  <!-- N branch: diamond → down → red filter node -->
  <line x1="16" y1="24" x2="16" y2="28" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="30" r="2" fill="#ef4444"/>
</svg>